<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英単語テスト</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', sans-serif; background: #f5f4f0; color: #1a1a1a; min-height: 100vh; }
.wrap { max-width: 640px; margin: 0 auto; padding: 2rem 1rem; }
h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.5rem; }
.card { background: #fff; border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; border-radius: 8px; border: none; font-size: 0.95rem; cursor: pointer; font-family: inherit; transition: opacity 0.15s, transform 0.1s; }
.btn:active { transform: scale(0.97); }
.btn-primary { background: #1a1a1a; color: #fff; }
.btn-primary:hover { opacity: 0.85; }
.btn-secondary { background: #efefef; color: #333; }
.btn-secondary:hover { background: #e0e0e0; }
.btn-danger { background: #fff0f0; color: #c0392b; }
.btn-danger:hover { background: #ffe0e0; }
.progress-wrap { margin-bottom: 1rem; }
.progress-meta { display: flex; justify-content: space-between; font-size: 0.85rem; color: #666; margin-bottom: 6px; }
.progress-bar { height: 5px; background: #e8e8e8; border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; background: #1a1a1a; border-radius: 3px; transition: width 0.4s; }
.timer-row { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; }
.timer-bar-wrap { flex: 1; height: 6px; background: #e8e8e8; border-radius: 3px; overflow: hidden; }
.timer-bar { height: 100%; border-radius: 3px; transition: width 1s linear, background 0.5s; }
.timer-num { font-size: 0.95rem; font-weight: 600; min-width: 28px; text-align: right; }
.badge { display: inline-block; font-size: 0.75rem; font-weight: 600; padding: 3px 10px; border-radius: 99px; margin-bottom: 1rem; }
.badge-en { background: #dbeafe; color: #1d4ed8; }
.badge-ja { background: #dcfce7; color: #15803d; }
.q-word { font-size: 2rem; font-weight: 600; margin-bottom: 0.4rem; letter-spacing: 0.01em; line-height: 1.3; }
.q-hint { font-size: 0.85rem; color: #888; margin-bottom: 1.5rem; }
input[type=text] { width: 100%; padding: 12px 14px; font-size: 1rem; border: 1.5px solid #ddd; border-radius: 8px; font-family: inherit; outline: none; transition: border-color 0.15s; }
input[type=text]:focus { border-color: #1a1a1a; }
input.correct { border-color: #15803d; background: #f0fdf4; }
input.wrong { border-color: #c0392b; background: #fff0f0; }
.feedback { margin-top: 10px; font-size: 0.9rem; min-height: 1.2em; }
.feedback.correct { color: #15803d; }
.feedback.wrong { color: #c0392b; }
.feedback.timeout { color: #e67e22; }
.btn-row { display: flex; gap: 8px; margin-top: 1.2rem; flex-wrap: wrap; }
.stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.5rem; }
.stat-card { background: #f5f4f0; border-radius: 10px; padding: 1rem; text-align: center; }
.stat-num { font-size: 2rem; font-weight: 600; }
.stat-label { font-size: 0.8rem; color: #888; margin-top: 4px; }
.miss-section h3 { font-size: 1rem; font-weight: 600; margin-bottom: 0.75rem; }
.miss-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
.miss-table th { text-align: left; padding: 6px 10px; background: #f5f4f0; color: #666; font-weight: 500; }
.miss-table td { padding: 7px 10px; border-top: 1px solid #f0f0f0; vertical-align: top; }
.miss-table td.wrong-ans { color: #c0392b; }
.miss-table td.skipped { color: #e67e22; font-style: italic; }
.miss-table td.timeout { color: #e67e22; font-style: italic; }
.screen { display: none; }
.screen.active { display: block; }
.result-badge { font-size: 1.4rem; font-weight: 700; padding: 0.6rem 1.5rem; border-radius: 99px; display: inline-block; margin-bottom: 1.5rem; }
.result-pass { background: #dcfce7; color: #15803d; }
.result-fail { background: #fee2e2; color: #c0392b; }
</style>
</head>
<body>
<div class="wrap">

<div id="screen-start" class="screen active">
  <h1>英単語テスト</h1>
  <div class="card">
    <p style="font-size:0.95rem;line-height:1.8;color:#444;">
      ・ランダムに100問出題します<br>
      ・英語→日本語、日本語→英語がミックスされます<br>
      ・1問30秒以内に回答してください<br>
      ・回答後Enterキーで次の問題に進めます
    </p>
    <div class="btn-row" style="margin-top:1.5rem;">
      <button class="btn btn-primary" onclick="startTest()">&#9654; テスト開始</button>
    </div>
  </div>
</div>

<div id="screen-test" class="screen">
  <div class="progress-wrap">
    <div class="progress-meta">
      <span id="q-counter"></span>
      <span id="q-score"></span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  </div>
  <div class="timer-row">
    <div class="timer-bar-wrap"><div class="timer-bar" id="timer-bar"></div></div>
    <div class="timer-num" id="timer-num">30</div>
  </div>
  <div class="card">
    <span class="badge" id="q-badge"></span>
    <p class="q-word" id="q-word"></p>
    <p class="q-hint" id="q-hint"></p>
    <input type="text" id="answer-input" placeholder="回答を入力..." autocomplete="off" autocorrect="off" autocapitalize="off">
    <p class="feedback" id="feedback"></p>
    <div class="btn-row">
      <button class="btn btn-primary" id="btn-check" onclick="checkAnswer()">&#10003; 確認</button>
      <button class="btn btn-secondary" id="btn-next" onclick="nextQ()" style="display:none">次へ &#8594;</button>
      <button class="btn btn-danger" id="btn-skip" onclick="skipQ()">スキップ</button>
    </div>
  </div>
</div>

<div id="screen-result" class="screen">
  <h1 style="margin-bottom:1rem;">テスト結果</h1>
  <div id="result-badge-wrap"></div>
  <div class="stat-grid">
    <div class="stat-card"><div class="stat-num" id="res-total"></div><div class="stat-label">出題数</div></div>
    <div class="stat-card"><div class="stat-num" id="res-correct" style="color:#15803d;"></div><div class="stat-label">正解</div></div>
    <div class="stat-card"><div class="stat-num" id="res-rate" style="color:#1d4ed8;"></div><div class="stat-label">正答率</div></div>
  </div>
  <div class="card miss-section">
    <h3>間違えた問題・スキップ・時間切れ</h3>
    <div id="miss-container"></div>
  </div>
  <div class="btn-row" style="margin-top:1.5rem;">
    <button class="btn btn-primary" onclick="startTest()">&#8635; もう一度</button>
  </div>
</div>

</div>

const TIME_LIMIT = 30;

let questions = [], current = 0, correctCount = 0, mistakes = [], answered = false;
let timerInterval = null, timeLeft = TIME_LIMIT;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startTest() {
  const pool = shuffle(ALL_WORDS).slice(0, 100);
  questions = pool.map(w => ({ ...w, type: Math.random() < 0.5 ? 'en-ja' : 'ja-en' }));
  current = 0; correctCount = 0; mistakes = [];
  showScreen('screen-test');
  renderQ();
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startTimer() {
  clearInterval(timerInterval);
  timeLeft = TIME_LIMIT;
  updateTimerUI();
  timerInterval = setInterval(function() {
    timeLeft--;
    updateTimerUI();
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      onTimeout();
    }
  }, 1000);
}

function stopTimer() {
  clearInterval(timerInterval);
}

function updateTimerUI() {
  const pct = timeLeft / TIME_LIMIT * 100;
  const bar = document.getElementById('timer-bar');
  const num = document.getElementById('timer-num');
  bar.style.width = pct + '%';
  num.textContent = timeLeft;
  if (timeLeft <= 10) {
    bar.style.background = '#ef4444';
    num.style.color = '#ef4444';
  } else if (timeLeft <= 20) {
    bar.style.background = '#f59e0b';
    num.style.color = '#f59e0b';
  } else {
    bar.style.background = '#1a1a1a';
    num.style.color = '#1a1a1a';
  }
}

function onTimeout() {
  if (answered) return;
  answered = true;
  const q = questions[current];
  const inp = document.getElementById('answer-input');
  inp.disabled = true;
  inp.className = 'wrong';
  const fb = document.getElementById('feedback');
  fb.textContent = '⏱ 時間切れ　正解: ' + (q.type === 'en-ja' ? q.ja : q.en);
  fb.className = 'feedback timeout';
  mistakes.push({ q, userAns: '', skipped: false, timeout: true });
  document.getElementById('btn-check').style.display = 'none';
  document.getElementById('btn-skip').style.display = 'none';
  // 1秒後に自動で次へ
  setTimeout(function() { nextQ(); }, 1000);
}

function renderQ() {
  if (current >= questions.length) { stopTimer(); showResult(); return; }
  const q = questions[current];
  answered = false;
  const badge = document.getElementById('q-badge');
  const inp = document.getElementById('answer-input');

  if (q.type === 'en-ja') {
    badge.textContent = '英語 → 日本語'; badge.className = 'badge badge-en';
    document.getElementById('q-word').textContent = q.en;
    document.getElementById('q-hint').textContent = '日本語の意味を入力してください';
  } else {
    badge.textContent = '日本語 → 英語'; badge.className = 'badge badge-ja';
    document.getElementById('q-word').textContent = q.ja;
    document.getElementById('q-hint').textContent = '英単語を入力してください';
  }

  inp.value = ''; inp.className = ''; inp.disabled = false;
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('btn-check').style.display = 'inline-flex';
  document.getElementById('btn-next').style.display = 'none';
  document.getElementById('btn-skip').style.display = 'inline-flex';

  const total = questions.length;
  document.getElementById('q-counter').textContent = (current + 1) + ' / ' + total;
  document.getElementById('q-score').textContent = '正解: ' + correctCount;
  document.getElementById('progress-fill').style.width = (current / total * 100) + '%';

  startTimer();
  inp.focus();
}

function removeBrackets(s) {
  return s.replace(/（[^）]*）/g, '').replace(/\([^)]*\)/g, '').replace(/［[^］]*］/g, '').replace(/\[[^\]]*\]/g, '').trim();
}

function normalize(s) {
  return s.trim().toLowerCase().replace(/[　\s]+/g, '').replace(/[・、。，,]/g, '').replace(/[～〜]/g, '');
}

function getAnswers(jaStr) {
  const candidates = new Set();
  const noBracket = removeBrackets(jaStr);
  noBracket.split(/[、,，]/).map(s => s.trim()).filter(Boolean).forEach(s => candidates.add(normalize(s)));
  jaStr.split(/[、,，]/).map(s => removeBrackets(s).trim()).filter(Boolean).forEach(s => candidates.add(normalize(s)));
  return candidates;
}

function checkAnswer() {
  if (answered) return;
  const q = questions[current];
  const inp = document.getElementById('answer-input');
  const fb = document.getElementById('feedback');
  const userAns = inp.value.trim();
  if (!userAns) { inp.focus(); return; }

  stopTimer();
  let isCorrect = false;
  if (q.type === 'en-ja') {
    isCorrect = getAnswers(q.ja).has(normalize(userAns));
  } else {
    isCorrect = normalize(userAns) === normalize(q.en);
  }

  answered = true; inp.disabled = true;
  if (isCorrect) {
    inp.className = 'correct';
    fb.textContent = '✓ 正解！'; fb.className = 'feedback correct';
    correctCount++;
  } else {
    inp.className = 'wrong';
    fb.textContent = '✗ 正解: ' + (q.type === 'en-ja' ? q.ja : q.en);
    fb.className = 'feedback wrong';
    mistakes.push({ q, userAns, skipped: false, timeout: false });
  }

  document.getElementById('q-score').textContent = '正解: ' + correctCount;
  document.getElementById('btn-check').style.display = 'none';
  document.getElementById('btn-next').style.display = 'inline-flex';
  document.getElementById('btn-skip').style.display = 'none';
  document.getElementById('btn-next').focus();
}

function skipQ() {
  stopTimer();
  mistakes.push({ q: questions[current], userAns: '', skipped: true, timeout: false });
  current++; renderQ();
}

function nextQ() { current++; renderQ(); }

function showResult() {
  showScreen('screen-result');
  const total = questions.length;
  const rate = Math.round(correctCount / total * 100);
  document.getElementById('res-total').textContent = total;
  document.getElementById('res-correct').textContent = correctCount;
  document.getElementById('res-rate').textContent = rate + '%';

  const pass = rate >= 80;
  document.getElementById('result-badge-wrap').innerHTML =
    '<span class="result-badge ' + (pass ? 'result-pass' : 'result-fail') + '">' +
    (pass ? '&#10003; 合格' : '&#10005; 不合格') + '</span>';

  const container = document.getElementById('miss-container');
  if (mistakes.length === 0) {
    container.innerHTML = '<p style="color:#15803d;padding:0.5rem 0;">全問正解！完璧です！</p>';
  } else {
    let html = '<table class="miss-table"><thead><tr><th>英単語</th><th>日本語</th><th>あなたの回答</th></tr></thead><tbody>';
    for (const m of mistakes) {
      let userTd;
      if (m.skipped) userTd = '<td class="skipped">スキップ</td>';
      else if (m.timeout) userTd = '<td class="timeout">時間切れ</td>';
      else userTd = '<td class="wrong-ans">' + esc(m.userAns || '—') + '</td>';
      html += '<tr><td>' + esc(m.q.en) + '</td><td>' + esc(m.q.ja) + '</td>' + userTd + '</tr>';
    }
    html += '</tbody></table>';
    container.innerHTML = html;
  }
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

const inp = document.getElementById('answer-input');
let isComposing = false;
inp.addEventListener('compositionstart', function() { isComposing = true; });
inp.addEventListener('compositionend', function() { isComposing = false; });
inp.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !isComposing) { if (!answered) checkAnswer(); else nextQ(); }
});
</script>
</body>
</html>
